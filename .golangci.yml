run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-dirs:
    - pkg/sdk  # WASM stub code uses unsafe.Pointer for host function bindings
  exclude-rules:
    - path: pkg/sdk/wasm_stubs\.go
      linters:
        - govet
      text: "possible misuse of unsafe.Pointer"
